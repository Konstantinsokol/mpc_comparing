world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [2.0, 2.0, 0.0]
    goal: [4.0, 9.0, 0.0]
    plot:
      show_trajectory: True
      show_goal: True

obstacle:
  - number: 4
    distribution: {name: 'manual'}
    kinematics: {name: 'omni'}
    behavior: {name: 'dash'}
    vel_max: [0.22, 0.22]
    vel_min: [-0.22, -0.22]
    shape:
      - {name: 'circle', radius: 0.2}
    state:
      - [3.2, 2.2, 0.0]
      - [3.8, 3.0, 0.0]
      - [3.8, 4.0, 0.0]
      - [3.2, 4.8, 0.0]
    # Все четыре в одну сторону вдоль ⊥ к (2,2)→(4,9) (n = (-7,2)/√53, d=2.2).
    goal:
      - [1.085, 2.804, 0.0]
      - [1.685, 3.604, 0.0]
      - [1.685, 4.604, 0.0]
      - [1.085, 5.404, 0.0]
    goal_threshold: 0.1
    plot:
      show_goal: false
