world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [1.0, 1.0, 0.0]
    goal: [9.0, 9.0, 0.0]
    plot:
      show_trajectory: True
      show_goal: True

obstacle:
  - number: 2
    distribution: {name: 'manual'}
    kinematics: {name: 'omni'}
    # Без behavior в ir-sim omni-препятствия остаются статичными (нулевая скорость).
    behavior: {name: 'dash'}
    vel_max: [0.25, 0.25]
    vel_min: [-0.25, -0.25]
    shape:
      - {name: 'circle', radius: 0.2}
    state:
      - [6.35, 4.5, 0.0]
      - [7.65, 4.5, 0.0]
    # Все препятствия в одну сторону вдоль ⊥ к (1,1)→(9,9) (start + d·n, один знак; d=2.4).
    goal:
      - [4.653, 6.197, 0.0]
      - [5.953, 6.197, 0.0]
    goal_threshold: 0.1
    plot:
      show_goal: false
