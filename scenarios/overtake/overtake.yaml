world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [1.0, 1.0, 0.0]
    goal: [9.0, 9.0, 0.0]
    plot:
      show_trajectory: True
      show_goal: True

obstacle:
  - kinematics: {name: 'omni'}
    behavior: {name: 'dash'}
    shape: {name: 'circle', radius: 0.2}
    state: [3.0, 3.0, 0.0]
    goal: [10.0, 10.0, 0.0]
    vel_min: [-0.5, -0.5]
    vel_max: [0.6, 0.6]
    goal_threshold: 0.1
    plot:
      show_goal: False
