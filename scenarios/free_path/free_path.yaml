world:
  height: 10
  width: 10
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 0]
  collision_mode: 'stop'
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'}
    shape: {name: 'circle', radius: 0.2}
    state: [1.0, 1.0, 0.0]
    goal: [9.0, 9.0, 0.0]
    plot:
      show_trajectory: True
      show_goal: True
